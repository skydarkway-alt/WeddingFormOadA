<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding RSVP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap');

  :root{
    --forest: #3D6BA8;
    --forest-deep: #2A5090;
    --paper: #FFFFFF;
    --paper-soft: #F9F5CC;
    --gold: #EFB229;
    --gold-soft: #F7E080;
    --rose: #E8786A;
    --ink: #2C4870;
    --ink-soft: #7A90A8;
    --radius: 22px;
    --shadow: 0 36px 70px -24px rgba(42,80,144,.22), 0 12px 24px -12px rgba(42,80,144,.14);
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 16px;
    font-family:'Poppins', 'Sarabun', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse 900px 600px at 50% -10%, #E8E4A4 0%, transparent 55%),
      radial-gradient(ellipse 800px 500px at 100% 110%, #E2DCA0 0%, transparent 50%),
      #F9F5CC;
    background-attachment: fixed;
  }

  .stage{ width:100%; max-width: 440px; }

  .card{
    position:relative;
    background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(61,107,168,0.07) 1px, transparent 0);
    background-size: 18px 18px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(61,107,168,.20);
    padding: 68px 34px 40px;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    inset: 10px;
    border: 1px solid rgba(61,107,168,.12);
    border-radius: calc(var(--radius) - 8px);
    pointer-events:none;
  }

  .lang-toggle{
    position:absolute; top:16px; right:16px; z-index:5;
    display:flex; gap:2px;
    background: var(--paper-soft);
    border:1px solid var(--gold-soft);
    border-radius:999px; padding:3px;
  }
  .lang-btn{
    border:none; background:transparent;
    font-family:'Poppins', sans-serif; font-size:10.5px; font-weight:600;
    letter-spacing:.04em; padding:5px 11px; border-radius:999px;
    cursor:pointer; color: var(--ink-soft);
    transition: background .2s ease, color .2s ease;
  }
  .lang-btn.active{ background: var(--forest); color: var(--paper); }
  .lang-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .content{ position:relative; animation: stepIn .5s cubic-bezier(.22,.61,.36,1); }
  @keyframes stepIn{ from{ opacity:0; transform: translateY(10px); } to{ opacity:1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce){
    .content{ animation:none; }
    *{ animation-duration: .001s !important; transition-duration: .001s !important; }
  }

  .back{
    background:none; border:none; padding:0;
    font-family:'Poppins', 'Sarabun', sans-serif; font-size:12.5px; color: var(--ink-soft);
    cursor:pointer; margin-bottom: 22px; display:flex; align-items:center; gap:4px;
    transition: color .2s ease;
  }
  .back:hover{ color: var(--gold); }

  .dots{ display:flex; gap:7px; margin-bottom: 26px; }
  .dot{ width:7px; height:7px; border-radius:50%; border:1.3px solid var(--gold); background:transparent; transition: background .25s ease; }
  .dot.filled{ background: var(--gold); }

  .eyebrow{
    font-family:'Poppins', 'Sarabun', sans-serif; font-size: 10.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--gold); margin: 0 0 14px;
  }
  .eyebrow.center{ text-align:center; }

  h1.names{
    font-family:'Dancing Script', cursive;
    font-weight: 700; font-size: clamp(44px, 12vw, 66px);
    line-height: 1.18; text-align:center;
    color: var(--forest); margin: 0;
  }
  h1.names .amp{ font-style: normal; font-weight:600; color: var(--forest); padding: 0 4px; font-size:.72em; vertical-align:middle; }

  .flourish{ display:block; margin: 18px auto; }
  .flourish path{
    stroke: var(--gold); stroke-width: 1.4; fill:none; stroke-linecap: round;
    stroke-dasharray: 240; stroke-dashoffset: 240; animation: draw 1.3s ease forwards .25s;
  }
  .flourish circle{ fill: var(--gold); opacity:0; animation: dotIn .4s ease forwards 1.1s; }
  @keyframes draw{ to{ stroke-dashoffset:0; } }
  @keyframes dotIn{ to{ opacity:1; } }
  .flourish.small path{ stroke-dasharray:120; stroke-dashoffset:0; animation:none; }
  .flourish.small circle{ opacity:1; animation:none; }

  .meta{ text-align:center; margin-top:18px; }
  .meta .line{ font-family:'Poppins', 'Sarabun', sans-serif; font-size:14px; color: var(--ink); margin:4px 0; }
  .meta .line.date{ color: #366baa; }
  .meta .line.muted{ color: var(--ink-soft); font-size:13.5px; }

  h2.heading{
    font-family:'Poppins', 'Sarabun', sans-serif; font-weight:600; font-size: clamp(19px, 5.5vw, 23px);
    color: var(--forest); margin: 0 0 8px; line-height:1.3;
  }
  .sub{ font-size:14px; color: var(--ink-soft); margin: 0 0 28px; line-height:1.6; }

  .field-label{ font-family:'Poppins', 'Sarabun', sans-serif; font-size:11.5px; color: var(--ink-soft); margin-bottom:8px; display:block; }
  input[type="text"]{
    width:100%; font-family:'Poppins', 'Sarabun', sans-serif; font-size:15px; padding: 14px 16px;
    border-radius: 12px; border: 1.4px solid var(--gold-soft);
    background: var(--paper-soft); color: var(--ink); outline:none;
    transition: border-color .2s ease, background .2s ease;
  }
  input[type="text"]:focus{ border-color: var(--gold); background:#fff; }
  input[type="text"]:focus-visible{ outline: 2px solid var(--gold); outline-offset:2px; }

  .btn-row{ margin-top: 28px; display:flex; justify-content:flex-end; }
  .btn-row.center{ justify-content:center; }

  .btn-primary{
    font-family:'Poppins', 'Sarabun', sans-serif; font-size:13.5px; font-weight:600; letter-spacing:.03em;
    background: var(--forest); color: var(--paper);
    border:none; border-radius:999px; padding: 14px 30px;
    cursor:pointer; box-shadow: 0 10px 22px -10px rgba(42,80,144,.35);
    transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
  }
  .btn-primary:hover:not(:disabled){ transform: translateY(-2px); }
  .btn-primary:disabled{ opacity:.38; cursor:not-allowed; box-shadow:none; transform:none; }
  .btn-primary:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

  .choice-card{
    width:100%; text-align:left; font-family:'Poppins', 'Sarabun', sans-serif; font-size:14px; color: var(--ink);
    background: var(--paper-soft); border: 1.5px solid var(--gold-soft); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 12px; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between;
    transition: border-color .18s ease, background .18s ease, transform .15s ease;
  }
  .choice-card:hover{ border-color: var(--gold); transform: translateY(-1px); }
  .choice-card:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .choice-card .title{ font-weight:500; }
  .choice-card .arrow{ color: var(--gold); font-size:17px; }

  .session-card{
    width:100%; text-align:left; background: var(--paper-soft);
    border: 1.5px solid var(--gold-soft); border-radius:14px;
    padding:14px 18px; margin-bottom:10px; cursor:pointer;
    display:flex; align-items:flex-start; gap:12px;
    transition: border-color .18s ease, background .18s ease;
  }
  .session-card.selected{ border-color: var(--forest); background:#fff; }
  .session-card .ring{
    margin-top:2px; width:17px; height:17px; border-radius:50%;
    border:1.6px solid var(--gold); flex-shrink:0; position:relative;
  }
  .session-card.selected .ring::after{
    content:""; position:absolute; inset:3px; border-radius:50%; background: var(--forest);
  }
  .session-card .stxt{ display:flex; flex-direction:column; }
  .session-card .stxt .t{ font-family:'Poppins', 'Sarabun', sans-serif; font-weight:600; font-size:14px; color:var(--ink); }
  .session-card .stxt .s{ font-size:12.5px; color: var(--ink-soft); margin-top:2px; }

  .stepper{ display:flex; align-items:center; justify-content:center; gap:22px; margin: 10px 0 6px; }
  .stepper button{
    width:42px; height:42px; border-radius:50%; border:1.5px solid var(--forest);
    background:transparent; color: var(--forest); font-size:19px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s ease, color .15s ease;
  }
  .stepper button:hover{ background: var(--forest); color:var(--paper); }
  .stepper button:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .stepper .count{ font-family:'Poppins', sans-serif; font-weight:600; font-size:34px; color: var(--forest); min-width:38px; text-align:center; }
  .stepper-label{ text-align:center; font-size:12.5px; color: var(--ink-soft); margin-bottom:8px; }

  .qr-wrap{ display:flex; flex-direction:column; align-items:center; margin: 22px 0 6px; }
  .qr-box{
    width: 230px; border-radius:16px; border: 1.6px solid var(--gold-soft);
    background: #fff; padding: 10px; box-shadow: 0 14px 30px -16px rgba(42,80,144,.18);
    overflow:hidden;
  }
  .qr-box img{ display:block; width:100%; height:auto; border-radius:8px; }
  .qr-caption{ font-family:'Poppins', 'Sarabun', sans-serif; font-size:12px; color: var(--ink-soft); margin-top:14px; letter-spacing:.03em; text-align:center; }

  .center-text{ text-align:center; }

  .footer-link{ margin-top: 26px; text-align:center; }
  .footer-link button{
    background:none; border:none; font-family:'Poppins', 'Sarabun', sans-serif; font-size:11.5px;
    color: var(--ink-soft); opacity:.75; cursor:pointer; text-decoration: underline; text-underline-offset:3px;
  }
  .footer-link button:hover{ color: var(--gold); opacity:1; }

  .summary-box{
    margin: 18px 0; padding: 14px 16px; border-radius:12px;
    background: var(--paper-soft); border:1px solid var(--gold-soft);
    font-size:13.5px; color: var(--ink);
  }
  .summary-box b{ color: var(--forest); }

  table.rsvp-table{ width:100%; border-collapse: collapse; font-size:13px; margin-top:8px; }
  table.rsvp-table th{
    text-align:left; font-family:'Poppins', sans-serif; font-size:10px; letter-spacing:.06em;
    text-transform:uppercase; color: var(--ink-soft); padding:6px 4px; border-bottom:1.5px solid var(--gold-soft);
  }
  table.rsvp-table td{ padding:8px 4px; border-bottom:1px solid rgba(61,107,168,.12); color: var(--ink); }
  .pill{ font-family:'Poppins', sans-serif; font-size:10.5px; font-weight:500; padding:3px 9px; border-radius:999px; display:inline-block; }
  .pill.yes{ background: rgba(61,107,168,.13); color: var(--forest); }
  .pill.no{ background: rgba(232,120,106,.16); color: var(--rose); }
  .empty-state{ text-align:center; color: var(--ink-soft); font-size:13.5px; padding: 22px 0; }
</style>
</head>

    </div>
    <div class="content" id="app"></div>
  </div>
</div>

      qrCaption: "สแกนเพื่อร่วมอวยพรเป็นของขวัญ",

      hostLoading: "กำลังโหลดข้อมูล…",
      emptyState: "ยังไม่มีผู้ตอบรับเข้ามาในตอนนี้",
      attendingSummary: function(n,g){ return "ตอบรับเข้าร่วม: " + n + " คน รวม " + g + " ท่าน"; },
      notAttendingSummary: function(n){ return "ไม่สะดวกมา: " + n + " คน"; },
      thName: "ชื่อ", thStatus: "สถานะ", thSide: "ฝ่าย", thCount: "จำนวน", thSession: "ช่วงเวลา",
      pillYes: "มาร่วมงาน", pillNo: "ไม่สะดวก",
      exportBtn: "ดาวน์โหลดเป็น Excel"
    },
    en: {
      startBtn: "Start",
      hostLink: "For hosts · View RSVP list",
      back: "‹ Back",
      backHost: "‹ Back to start",
      step1: "Step 1 · Your name",
      nameHeading: "What's your name?",
      nameSub: "So the hosts know who's responding",
      nameLabel: "Full name",
      namePlaceholder: "e.g. Jane Smith",
      next: "Next",
      step2: "Step 2 · Confirm attendance",
      welcome: "Welcome, ",
      attendingSub: "Will you be able to join us on our special day?",
      attendYes: "Yes, I'll be there",
      attendNo: "Sorry, I can't make it",
      step3: "Step 3 · Which side",
      teamHeading: "Which side are you on?",
      teamSub: "Pick the side you know",
      teamGroom: "Groom's side",
      teamBride: "Bride's side",
      teamSidePrefix: "",
      declinedEyebrow: "Thank you for letting us know",
      declinedHeading: "Thank you so much<br>for taking the time to reply",
      declinedSub: "We'll miss you on the big day. If you'd like<br>to send a gift, feel free to scan the QR code below",
      qrCaption: "Scan to send a gift",
      step4: "Step 4 · Number of guests",
      countHeading: "How many will be joining?",
      countSub: "Include yourself in the count",
      countLabel: "Guests",
      step5: "Step 5 · Preferred session",
      sessionHeading: "Which session works for you?",
      sessionSub: "Pick one session",
      confirmBtn: "Confirm",
      confirmedEyebrow: "confirmed",
      confirmedHeading: "Thank you for sharing<br>in our special day",
      guestsUnit: " guests · ",
      seeYouPrefix: "See you on ",
      seeYouSuffix: "",
      hostEyebrow: "For hosts",
      hostHeading: "RSVP list",
      hostLoading: "Loading…",
      emptyState: "No responses yet",
      attendingSummary: function(n,g){ return "Attending: " + n + " people, " + g + " guests total"; },
      notAttendingSummary: function(n){ return "Not attending: " + n + " people"; },
      thName: "Name", thStatus: "Status", thSide: "Side", thCount: "Guests", thSession: "Session",
      pillYes: "Attending", pillNo: "Not attending",
      exportBtn: "Download Excel"
    }
  };

  const state = {
    step: "cover",
    name: "",
    attending: null,
    team: null,
    count: 1,
    session: null,
    lang: "en"
  };

  const app = document.getElementById("app");
  let hostRecords = [];

  function t(){ return T[state.lang]; }

  function flourish(opts){
    opts = opts || {};
    const cls = opts.small ? "flourish small" : "flourish";
    const w = opts.small ? 110 : 200;
    const h = opts.small ? 18 : 30;
    return `<svg class="${cls}" width="${w}" height="${h}" viewBox="0 0 200 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 15 C 40 2, 70 28, 92 15"></path>
      <circle cx="100" cy="15" r="2.6"></circle>
      <path d="M108 15 C 130 2, 160 28, 200 15"></path>
    </svg>`;
  }

  function dots(total, current){
    let out = '<div class="dots">';
    for(let i=1;i<=total;i++){
      out += `<span class="dot ${i<=current ? 'filled':''}"></span>`;
    }
    return out + '</div>';
  }

// เปลี่ยน URL ตรงนี้เป็น Web App URL ที่คุณคัดลอกมา
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPq8aCsbO281mSvgip4vEh0xXwkMild5laNH3ayC6BrQoguOH0jDXwGnj6d_JLfQ6q/exec";

  async function saveRSVP(){
    try{
      const id = Date.now() + "-" + Math.random().toString(36).slice(2,8);
      const record = {
        id,
        name: state.name,
        attending: state.attending,
        team: state.attending ? state.team : null,
        count: state.attending ? state.count : null,
        session: state.attending ? state.session : null,
        ts: new Date().toISOString()
      };
      
      // ส่งข้อมูลไปยัง Google Sheet แบบ POST (ไม่ใช้โหมด no-cors เพื่อให้สามารถอ่าน response กลับมาได้ ถ้าไม่มีปัญหา origin)
      await fetch(SCRIPT_URL, {
        method: "POST",
        // ส่งเป็น plain/text เพื่อเลี่ยงปัญหา CORS preflight ในบางเบราว์เซอร์
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(record)
      });
    }catch(e){
      console.error("save failed", e);
    }
  }
	
  async function loadAllRSVPs(){
    try{
      // ดึงข้อมูลจาก Google Sheet แบบ GET
      const res = await fetch(SCRIPT_URL);
      const records = await res.json();
      
      // จัดเรียงลำดับจากใหม่สุดไปเก่าสุด
      records.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
      return records;
    }catch(e){
      console.error("load failed", e);
      return [];
    }
  }
  function teamLabelOf(id){
    if(id === "groom") return t().teamGroom + " · " + t().teamSidePrefix + EVENT.groom;
    if(id === "bride") return t().teamBride + " · " + t().teamSidePrefix + EVENT.bride;
    return "";
  }

  function sessionLabelOf(id){
    const found = SESSIONS.find(s=>s.id===id);
    return found ? found.title[state.lang] : "";
  }

  function exportToExcel(records){
    if(typeof XLSX === "undefined"){
      alert("ไม่สามารถโหลดเครื่องมือ Excel ได้ในขณะนี้ ลองเช็คอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง");
      return;
    }
    const rows = records.map(r => ({
      "ชื่อ": r.name,
      "สถานะ": r.attending ? "มาร่วมงาน" : "ไม่สะดวก",
      "ฝ่าย": r.attending ? teamLabelOf(r.team) : "",
      "จำนวน (ท่าน)": r.attending ? r.count : "",
      "ช่วงเวลา": r.attending ? sessionLabelOf(r.session) : "",
      "เวลาตอบกลับ": new Date(r.ts).toLocaleString("th-TH")
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:24},{wch:14},{wch:16},{wch:12},{wch:16},{wch:20}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "RSVP");
    XLSX.writeFile(wb, `รายชื่อผู้ตอบรับ-${EVENT.groom}-${EVENT.bride}.xlsx`);
  }

  function go(step){ state.step = step; render(); window.scrollTo(0,0); }

  function render(){
    let html = "";
    if(state.step === "cover") html = renderCover();
    else if(state.step === "name") html = renderName();
    else if(state.step === "attending") html = renderAttending();
    else if(state.step === "team") html = renderTeam();
    else if(state.step === "declined") html = renderDeclined();
    else if(state.step === "count") html = renderCount();
    else if(state.step === "session") html = renderSession();
    else if(state.step === "confirmed") html = renderConfirmed();
    else if(state.step === "host") html = renderHostLoading();

    app.innerHTML = `<div class="content">${html}</div>`;
    attachHandlers();

    if(state.step === "host") loadAndRenderHost();
  }

  function renderCover(){
    return `
      <p class="eyebrow center">${EVENT.eyebrowInvite[state.lang]}</p>
      <h1 class="names">${EVENT.groom}<span class="amp">&amp;</span>${EVENT.bride}</h1>
      <div style="display:flex;justify-content:center;">${flourish()}</div>
      <div class="meta">
        <p class="line date">${EVENT.dateText[state.lang]}</p>
        <p class="line muted">${EVENT.venueText[state.lang]}</p>
      </div>
      <div class="btn-row center" style="margin-top:30px;">
        <button class="btn-primary" id="startBtn">${t().startBtn}</button>
      </div>
      ${isHostMode() ? `
      <div class="footer-link">
        <button id="hostLink">${t().hostLink}</button>
      </div>` : ""}
    `;
  }

  function renderName(){
    return `
      ${dots(5,1)}
      <p class="eyebrow">${t().step1}</p>
      <h2 class="heading">${t().nameHeading}</h2>
      <p class="sub">${t().nameSub}</p>
      <label class="field-label" for="nameInput">${t().nameLabel}</label>
      <input type="text" id="nameInput" placeholder="${t().namePlaceholder}" value="${escapeAttr(state.name)}" autocomplete="name">
      <div class="btn-row">
        <button class="btn-primary" id="nameNext" ${state.name.trim() ? "" : "disabled"}>${t().next}</button>
      </div>
    `;
  }

  function renderAttending(){
    return `
      <button class="back" id="backBtn">${t().back}</button>
      ${dots(5,2)}
      <p class="eyebrow">${t().step2}</p>
      <h2 class="heading">${t().welcome}${escapeHtml(state.name)}</h2>
      <p class="sub">${t().attendingSub}</p>
      <button class="choice-card" id="attendYes">
        <span class="title">${t().attendYes}</span>
        <span class="arrow">→</span>
      </button>
      <button class="choice-card" id="attendNo">
        <span class="title">${t().attendNo}</span>
        <span class="arrow">→</span>
      </button>
    `;
  }

  function renderTeam(){
    const teams = [
      { id:"groom", title: t().teamGroom, sub: t().teamSidePrefix + EVENT.groom },
      { id:"bride", title: t().teamBride, sub: t().teamSidePrefix + EVENT.bride }
    ];
    const cards = teams.map(team => `
      <button class="session-card ${state.team===team.id ? 'selected':''}" data-team="${team.id}">
        <span class="ring"></span>
        <span class="stxt"><span class="t">${team.title}</span><span class="s">${team.sub}</span></span>
      </button>
    `).join("");
    return `
      <button class="back" id="backBtn">${t().back}</button>
      ${dots(5,3)}
      <p class="eyebrow">${t().step3}</p>
      <h2 class="heading">${t().teamHeading}</h2>
      <p class="sub">${t().teamSub}</p>
      ${cards}
      <div class="btn-row" style="margin-top:22px;">
        <button class="btn-primary" id="teamNext" ${state.team ? "" : "disabled"}>${t().next}</button>
      </div>
    `;
  }

  function renderDeclined(){
    return `
      <p class="eyebrow center">${t().declinedEyebrow}</p>
      <h2 class="heading center-text" style="text-align:center;">${t().declinedHeading}</h2>
      <p class="sub center-text" style="text-align:center;">${t().declinedSub}</p>
      <div class="qr-wrap">
        <div class="qr-box"><img src="${QR_IMAGE}" alt="PromptPay QR code"></div>
        <p class="qr-caption">${t().qrCaption}</p>
      </div>
      <div class="btn-row center" style="margin-top:10px;">${flourish({small:true})}</div>
    `;
  }

  function renderCount(){
    return `
      <button class="back" id="backBtn">${t().back}</button>
      ${dots(5,4)}
      <p class="eyebrow">${t().step4}</p>
      <h2 class="heading">${t().countHeading}</h2>
      <p class="sub">${t().countSub}</p>
      <p class="stepper-label">${t().countLabel}</p>
      <div class="stepper">
        <button id="minusBtn" aria-label="minus">−</button>
        <span class="count" id="countVal">${state.count}</span>
        <button id="plusBtn" aria-label="plus">+</button>
      </div>
      <div class="btn-row" style="margin-top:24px;">
        <button class="btn-primary" id="countNext">${t().next}</button>
      </div>
    `;
  }

  function renderSession(){
    const cards = SESSIONS.map(s => `
      <button class="session-card ${state.session===s.id ? 'selected':''}" data-session="${s.id}">
        <span class="ring"></span>
        <span class="stxt"><span class="t">${s.title[state.lang]}</span><span class="s">${s.sub[state.lang]}</span></span>
      </button>
    `).join("");
    return `
      <button class="back" id="backBtn">${t().back}</button>
      ${dots(5,5)}
      <p class="eyebrow">${t().step5}</p>
      <h2 class="heading">${t().sessionHeading}</h2>
      <p class="sub">${t().sessionSub}</p>
      ${cards}
      <div class="btn-row" style="margin-top:22px;">
        <button class="btn-primary" id="confirmBtn" ${state.session ? "" : "disabled"}>${t().confirmBtn}</button>
      </div>
    `;
  }

  function renderConfirmed(){
    const sessionLabel = sessionLabelOf(state.session);
    const teamLabel = teamLabelOf(state.team);
    return `
      <p class="eyebrow center">${t().confirmedEyebrow}</p>
      <h2 class="heading center-text" style="text-align:center;">${t().confirmedHeading}</h2>
      <div class="summary-box">
        <div><b>${escapeHtml(state.name)}</b></div>
        <div>${teamLabel}</div>
        <div>${state.count}${t().guestsUnit}${sessionLabel}</div>
      </div>
      <p class="sub center-text" style="text-align:center;">${t().seeYouPrefix}${EVENT.dateText[state.lang]}${t().seeYouSuffix}</p>
      <div class="btn-row center">${flourish({small:true})}</div>
    `;
  }

  function renderHostLoading(){
    return `
      <button class="back" id="backBtn">${t().backHost}</button>
      <p class="eyebrow">${t().hostEyebrow}</p>
      <h2 class="heading">${t().hostHeading}</h2>
      <p class="sub">${t().hostLoading}</p>
    `;
  }

  async function loadAndRenderHost(){
    const records = await loadAllRSVPs();
    hostRecords = records;
    const yes = records.filter(r=>r.attending);
    const no = records.filter(r=>!r.attending);
    const totalGuests = yes.reduce((sum,r)=> sum + (r.count||1), 0);

    let body;
    if(records.length === 0){
      body = `<div class="empty-state">${t().emptyState}</div>`;
    }else{
      const rows = records.map(r => `
        <tr>
          <td>${escapeHtml(r.name)}</td>
          <td><span class="pill ${r.attending ? 'yes':'no'}">${r.attending ? t().pillYes : t().pillNo}</span></td>
          <td>${r.attending ? teamLabelOf(r.team) : "—"}</td>
          <td>${r.attending ? r.count : "—"}</td>
          <td>${r.attending ? sessionLabelOf(r.session) : "—"}</td>
        </tr>
      `).join("");
      body = `
        <div class="summary-box">
          <div>${t().attendingSummary(yes.length, totalGuests)}</div>
          <div>${t().notAttendingSummary(no.length)}</div>
        </div>
        <table class="rsvp-table">
          <thead><tr><th>${t().thName}</th><th>${t().thStatus}</th><th>${t().thSide}</th><th>${t().thCount}</th><th>${t().thSession}</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="btn-row center" style="margin-top:18px;">
          <button class="btn-primary" id="exportBtn">${t().exportBtn}</button>
        </div>
      `;
    }

    app.innerHTML = `<div class="content">
      <button class="back" id="backBtn">${t().backHost}</button>
      <p class="eyebrow">${t().hostEyebrow}</p>
      <h2 class="heading">${t().hostHeading}</h2>
      ${body}
    </div>`;
    attachHandlers();
  }

  function escapeHtml(str){
    const d = document.createElement("div");
    d.innerText = str;
    return d.innerHTML;
  }
  function escapeAttr(str){
    return escapeHtml(str).replace(/"/g, "&quot;");
  }

  function attachHandlers(){
    const $ = (id) => document.getElementById(id);

    if($("startBtn")) $("startBtn").onclick = () => go("name");
    if($("hostLink")) $("hostLink").onclick = () => {
      const pin = window.prompt("กรุณาใส่รหัสผ่านสำหรับเจ้าภาพ");
      if(pin === null) return;
      if(pin === HOST_PIN) go("host");
      else alert("รหัสผ่านไม่ถูกต้อง");
    };
    if($("backBtn")) $("backBtn").onclick = () => {
      if(state.step === "attending") go("name");
      else if(state.step === "team") go("attending");
      else if(state.step === "count") go("team");
      else if(state.step === "session") go("count");
      else if(state.step === "host") go("cover");
    };

    if($("nameInput")){
      $("nameInput").oninput = (e) => {
        state.name = e.target.value;
        $("nameNext").disabled = !state.name.trim();
      };
      $("nameInput").onkeydown = (e) => {
        if(e.key === "Enter" && state.name.trim()) go("attending");
      };
    }
    if($("nameNext")) $("nameNext").onclick = () => { state.name = state.name.trim(); go("attending"); };

    if($("attendYes")) $("attendYes").onclick = () => { state.attending = true; go("team"); };
    if($("attendNo")) $("attendNo").onclick = () => { state.attending = false; go("declined"); saveRSVP(); };

    if($("minusBtn")) $("minusBtn").onclick = () => {
      state.count = Math.max(1, state.count - 1);
      $("countVal").textContent = state.count;
    };
    if($("plusBtn")) $("plusBtn").onclick = () => {
      state.count = Math.min(20, state.count + 1);
      $("countVal").textContent = state.count;
    };
    if($("countNext")) $("countNext").onclick = () => go("session");

    document.querySelectorAll("[data-team]").forEach(btn => {
      btn.onclick = () => { state.team = btn.getAttribute("data-team"); render(); };
    });
    if($("teamNext")) $("teamNext").onclick = () => go("count");

    document.querySelectorAll("[data-session]").forEach(btn => {
      btn.onclick = () => { state.session = btn.getAttribute("data-session"); render(); };
    });
    if($("confirmBtn")) $("confirmBtn").onclick = () => {
      if(!state.session) return;
      go("confirmed");
      saveRSVP();
    };

    if($("exportBtn")) $("exportBtn").onclick = () => exportToExcel(hostRecords);
  }

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.onclick = () => {
      state.lang = btn.getAttribute("data-lang");
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    };
  });

  render();
})();
</script>
</body>
</html>
